uk:
  my_name: Мене звуть <b>%{name}</b>.
  amavasya_full: <b>Амавасья</b> 🌑 (Молодий місяць)
  purnima_full: <b>Пурніма</b> 🌕 (Повний місяць)
  ekadashi_full: <b>Екадаші</b> 🌘 – одинадцятий місячний день (тітхі) після молодого місяця або повного, найбільш сприятливий день для голодування
  tithi_description: >-
    Час початку тітхі та його закінчення:
  can_stop: Ти можеш в будь-який момент відписатися від розсилки за допомогою команди /stop.
  mission: >
    Я тут, щоб розраховувати дні голодування
    (<i>Екадаші, Амавасья, Пурніма</i>)
    згідно з твоїм місцем проживання.
  start_choose_location: >
    Будь ласка, натисни на скріпку (де зазвичай прикріплюють файли)
    та обери <b>Location</b> або <b>Місце розташування</b>
    або просто <b>введи назву міста</b> або місця.
  location_first: Для початку додай локацію за допомогою команди /start
  ready_to_send: За день до %{days}, я буду надсилати тобі нагадування про них.
  to_danate: Детальніша інформація, як фінансово віддячити, тут ➡ /donate 🙃
  days_update: >
    Ти зможеш оновити дні, в які голодуєш в будь-який момент, за допомогою команди /update_days
  start_choose_day: >
    %{and_now}, давай оберемо дні голодування, в які ти хочеш отримувати сповіщення.
  location_update: >
    Ти зможеш оновити свою локацію в будь-який момент, за допомогою команди /update_location
  set_location: Твоя локація оновлена!
  no_user: >
    Тебе немає в моєму списку. Так що тут немає чого зупиняти.
    Але якщо захочеш, можна почати отримувати сповіщення через /start
  no_send: >-
    Я не буду надсилати тобі сповіщення, але ти можеш в будь-який момент скористатись командою /get_fasting,
    щоб отримати список найближчих днів голодування для твоєї локації!
  stop: Я скасував твою підписку на сповіщення.
  again: Натисни /start, якщо знову захочеш запустити ці процеси.
  try_again: Спробуй знову!
  something_wrong: Щось не так з цим запитом.
  check_location: Перевір, чи правильно я визначив твоє місце розташування?
  no_answer: >
    Без варіантів відповіді я, на жаль, не зможу розраховувати дні голодування.
  to_early: >
    Будь ласка, не навантажуй мене так часто розрахунками.
    Ці числа, синуси, косинуси... Від цього вже починає боліти голова.
    Почекай хоча б кілька хвилин!
  meet_first: |
    Спочатку мені потрібна твоя локація та дні голодування, які тобі необхідні.
    Натисни /start, щоб розпочати.
  tithi_answer: |-
    Найближчі сприятливі дні голодування для <b>%{place}</b> (UTC%{utc}):
  tithi_wait: Зачекай хвилинку, я перевірю небо. Мені потрібно провести розрахунки... X*y*sin*cos*tan*E*pi/2...
  location_error: |
    Щось не так із координатами. Не можу виконати розрахунки.
    Спробуй оновити свою локацію за допомогою команди /update_location.
  choose_language: "Обери свою мову"
  language_changed: "Мову змінено!"
