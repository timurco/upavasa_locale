uk:
   help: |
      %{my_name}
      %{mission}
      <b>В твоєму розпорядженні доступні наступні команди:</b>
      • /help - Цей текст
      • /start - Почати вносити заново або змінити поточні настройки (локацію та день)
      • /cancel - Скасувати введення даних
      • /update_days - Оновити дні голодування. Екадаши, або Екадаши, Пурніми та Амавасьї
      • /update_location - Оновити свою локацію
      • /get_fasting - Розрахувати та отримати список найближчих днів голодування відповідно до моєї локації
      • /stop - Видалити себе з розсилки
      • /lang - Змінити мову
      • /donate - Показати, куди можна пожертвувати
      
      <b>---- ✍️ Процес реєстрації ----</b>
      <b>1.</b> Спочатку діалог (/start) запропонує можливість додати свою локацію та зареєструватися в системі.
      <b>2.</b> Локацію можна додати за допомогою іконки скріпки та прикріплення поточного місцезнаходження, або ти можеш ввести <u>назву будь-якого місця (місто, населений пункт)</u> англійською, російською чи українською мовами.
      Далі потрібно підтвердити свою локацію, якщо ти скористався текстовим введенням для її визначення, або спробувати ввести назву місця знову, відповівши <pre>«Ні»</pre>.
      У майбутньому локацію можна змінити за допомогою команди - /update_location
      <b>3.</b> На наступному етапі потрібно вибрати дні голодування, в які ти хотів би отримувати повідомлення. Наприклад, якщо ти вибереш тільки Екадаші, попередження про наближення Амавасьї та Пурніми тобі відправлятися не будуть.
      Також на цьому етапі можна вибрати <pre>«Відмовитися від повідомлень»</pre>. Тоді ти зможеш отримувати запит про найближчі дні голодування вручну, за допомогою команди /get_fasting, твоя локація при цьому збережеться.
      Цей день можна змінити пізніше за допомогою команди - /update_days.
      
      <b>---- 🗒 ----</b>
      Якщо у вас є запитання або ви бажаєте внести свої пропозиції щодо розвитку бота чи навіть взяти участь у його розробці, то для цього є чат <a href="https://t.me/+IJ8j_POnh0dkNWY1">Упаваса Бот – Розробка</a>.
