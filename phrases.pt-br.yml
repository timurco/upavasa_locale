pt-br:
  my_name: Meu nome é <b>%{name}</b>.
  amavasya_full: <b>Amavasya</b> 🌑 (Lua nova)
  purnima_full: <b>Purnima</b> 🌕 (Lua cheia)
  ekadashi_full: <b>Ekadashi</b> 🌘 – décimo primeiro dia após a lua nova ou cheia, o dia mais auspicioso para jejum
  tithi_description: >-
    Os horários de início e fim do Tithi:
  can_stop: Você pode cancelar a inscrição da lista de notificações a qualquer momento usando o comando /stop.
  mission: >
    Estou aqui para contar os dias de jejum
    (<i>Ekadashi, Amavasya, Purnima</i>)
    de acordo com sua localização.
  start_choose_location: >
    Por favor, clique no clipe de papel (onde os arquivos são normalmente anexados)
    e escolha <b>Localização</b>
    ou simplesmente <b>digite o nome da cidade</b> ou local
  location_first: Para começar, adicione uma localização através do comando /start
  ready_to_send: Um dia antes de %{days}, eu enviarei um lembrete para você.
  to_danate: Se você gostaria de doar, por favor clique aqui para detalhes. /donate 🙃
  days_update: >
    Você pode atualizar os dias que está jejuando a qualquer momento através do comando /update_days
  start_choose_day: >
    %{and_now}, vamos escolher os dias de jejum para os quais você deseja receber notificações.
  location_update: >
    Você pode atualizar sua localização a qualquer momento através do comando /update_location
  set_location: Sua localização foi atualizada!
  no_user: >
    Você não está na minha lista. Então não há nada para parar aqui.
    Mas se quiser, você pode iniciar notificações via /start
  no_send: >-
    Não enviarei notificações para você, mas você pode usar o comando /get_fasting
    a qualquer momento para obter uma lista de dias de jejum futuros de acordo com sua localização!
  stop: Cancelei sua inscrição de notificações..
  again: Pressione /start se quiser começar novamente
  try_again: Tente novamente!
  something_wrong: Algo está errado com esta solicitação
  check_location: Verifique se encontrei sua localização corretamente?
  no_answer: >
    Sem opções de resposta, infelizmente, não poderei calcular os dias de jejum
  to_early: >
    Por favor, não me sobrecarregue tão frequentemente com cálculos.
    Estes números, senos, cossenos ... Isso já está começando a doer minha cabeça.
    Aguarde alguns minutos!
  meet_first: |
    Primeiro, preciso de sua localização e quais dias você quer jejuar.
    Pressione /start para começar.
  tithi_answer: |-
    Os próximos dias auspiciosos de jejum para <b>%{place}</b> (UTC%{utc}):
  tithi_wait: Aguarde um segundo, vou olhar para o céu. Preciso fazer os cálculos... X*y*sin*cos*tan*E*pi/2...
  location_error: |
    Algo está errado com as coordenadas. Não consigo calcular.
    Tente atualizar sua localização através do comando /update_location',
  choose_language: "Escolha seu idioma"
  language_changed: "Idioma alterado!"
