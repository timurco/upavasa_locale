bg:
  my_name: Казвам се <b>%{name}</b>.
  amavasya_full: <b>Амавася</b> 🌑 (Новолуние)
  purnima_full: <b>Пурнима</b> 🌕 (Пълнолуние)
  ekadashi_full: <b>Екадаши</b> 🌘 - единадесетият лунен ден след новолуние или пълнолуние, най-благоприятен ден за пости
  tithi_description: >-
    Времето на начало и край на титхи:
  can_stop: Винаги можеш да се отпишеш от рассилката с командата /stop.
  mission: >
    Аз съм тук, за да изчислявам дните за пост
    (<i>Екадаши, Амавася, Пурнима</i>)
    според местоположението, в което се намираш.
  start_choose_location: >
    Моля, <b>въведи името на града</b> или мястото
    или просто кликни върху прикрепения файл
    и избери <b>Местоположение</b> или <b>Location</b>
  location_first: За да започнеш, добави местоположение с командата /start
  ready_to_send: Ден преди %{days}, ще ти изпратя напомняния за тях.
  to_danate: По-подробна информация как да благодариш с финанси, тук ➡ /donate 🙃
  days_update: >
    Винаги можеш да обновиш дните, в които постиш, с командата /update_days
  start_choose_day: >
    %{and_now}, нека изберем дните за пост, на които искаш да получаваш уведомления.
  location_update: >
    Винаги можеш да обновиш местоположението си с командата /update_location
  set_location: Твоето местоположение е актуализирано!
  no_user: >
    Нямаш запис в моя списък. Така че няма какво да спирам.
    Но ако искаш, можеш да започнеш уведомленията отново с /start
  no_send: >-
    Няма да ти изпращам уведомления, но винаги можеш да използваш командата /get_fasting,
    за да получиш списък с най-близките дни за пост в твоето местоположение!
  stop: Отмених твоята абонаментна услуга за уведомления.
  again: Натисни /start, ако искаш да стартираш тези процеси отново.
  try_again: Опитай отново!
  something_wrong: Нещо не е наред с тази заявка.
  check_location: Провери дали правилно съм открил твоето местоположение?
  no_answer: >
    Без възможности за отговор, за съжаление, няма как да изчислявам дните за пост.
  to_early: >
    Моля, не ме натоварвай толкова често с изчисления.
    Тези числа, синуси, косинуси... Вече ми боли главата.
    Почакай поне няколко минути!
  meet_first: |
    За начало, трябва ми твоето местоположение и кои дни за пост искаш.
    Натисни /start, за да започнеш.
  tithi_answer: |-
    Близките благоприятни дни за пост в <b>%{place}</b> (UTC%{utc}):
  tithi_wait: Моля, изчакай, ще погледна към небето. Трябва да направя изчисления... X*y*sin*cos*tan*E*pi/2...
  location_error: |
    Нещо не е наред с координатите. Не мога да изчисля.
    Опитай да актуализираш местоположението си с командата /update_location,
  choose_language: "Изберете своя език"
  language_changed: "Езикът е променен!"
