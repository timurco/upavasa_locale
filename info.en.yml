    https://anandasambhuti.org/ways-to-donate/

    <b>2. <a href='https://stc-maharlika.org'>STC Maharlika</a></b> — training centre for sisters in the Philippines
    https://donorbox.org/support-the-future-generation-of-didis-stc

    <b>3. Phoenix Project</b> — humanitarian project by Didi in Ukraine
    https://phoenixproject.org.ua/en/volunteering#donate

