en:
  help: |
    %{my_name}
    %{mission}
    <b>The following commands are available:</b>
    • /help - Information about this commands
    • /start - Start adding settings again or edit the current (Location and day)
    • /cancel - Cancel data entry
    • /update_days - Update fasting days. Ekadashi, or Ekadashi, Purnima and Amavasya
    • /update_location - Update your location
    • /get_fasting - Calculate and get a list of upcoming fasts according to my location (<i>there is a restriction - no more than 1 request per 10 minutes.</i>) 
    • /stop - Remove yourself from mailing list
    • /lang - Change language
    • /donate - Show where you can donate
  donate_jamalpur: |
