pt-pt:
  help: |
    %{my_name}
    %{mission}
    <b>Os seguintes comandos estão disponíveis:</b>
    • /help - Informação sobre estes comandos
    • /start - Começar a adicionar definições novamente ou editar as actuais (Localização e dia)
    • /cancel - Cancelar a entrada de dados
    • /update_days - Actualizar os dias de jejum. Ekadashi, ou Ekadashi, Purnima e Amavasya
    • /update_location - Actualizar a sua localização
    • /get_fasting - Calcular e obter uma lista dos jejuns futuros segundo a sua localização (<i>existe uma restrição - não mais que 1 pedido por 10 minutos.</i>)
    • /stop - Remover-se da lista de correio
    • /lang - Mudar idioma
    • /donate - Mostrar onde pode doar
  donate_jamalpur: |
    🙏 <b>Projectos que pode apoiar:</b>

    <b>1. Ananda Sambhuti</b> — construção de um centro espiritual em Jamalpur
    https://anandasambhuti.org/ways-to-donate/

    <b>2. <a href='https://stc-maharlika.org'>STC Maharlika</a></b> — centro de formação para irmãs nas Filipinas
    https://donorbox.org/support-the-future-generation-of-didis-stc

    <b>3. Phoenix Project</b> — projecto humanitário de Didi na Ucrânia
    https://phoenixproject.org.ua/en/volunteering#donate

    Nos comentários do pagamento, pode adicionar que é do bot Upavasa. Obrigado! 🙏


