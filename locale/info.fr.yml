fr:
  help: |
    %{my_name}
    %{mission}
    <b>Les commandes suivantes sont disponibles :</b>
    • /help - Informations sur ces commandes
    • /start - Commencer à ajouter des paramètres à nouveau ou modifier les actuels (Emplacement et jour)
    • /cancel - Annuler la saisie de données
    • /update_days - Mettre à jour les jours de jeûne. Ekadashi, ou Ekadashi, Purnima et Amavasya
    • /update_location - Mettre à jour votre emplacement
    • /get_fasting - Calculer et obtenir une liste des jeûnes à venir selon votre emplacement (<i>il y a une restriction - pas plus d'une demande par 10 minutes.</i>)
    • /stop - Vous retirer de la liste de diffusion
    • /donate - Afficher où vous pouvez faire un don
  donate_jamalpur: |
    🙏 <b>Projets que vous pouvez soutenir :</b>

    <b>1. Ananda Sambhuti</b> — construction d'un centre spirituel à Jamalpur
    https://anandasambhuti.org/ways-to-donate/

    <b>2. <a href='https://stc-maharlika.org'>STC Maharlika</a></b> — centre de formation pour les sœurs aux Philippines
    https://donorbox.org/support-the-future-generation-of-didis-stc

    <b>3. Phoenix Project</b> — projet humanitaire de Didi en Ukraine
    https://phoenixproject.org.ua/en/volunteering#donate

    Dans les commentaires de paiement, vous pouvez ajouter que vous venez du bot Upavasa. Merci ! 🙏


