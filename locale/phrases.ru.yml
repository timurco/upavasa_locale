ru:
  my_name: Меня зовут <b>%{name}</b>.
  amavasya_full: <b>Амавасья</b> 🌑 (Новолуние)
  purnima_full: <b>Пурнима</b> 🌕 (Полнолуние)
  ekadashi_full: <b>Экадаши</b> 🌘 – одиннадцатый день после новолуния или полнолуния, наиболее благоприятный день для голодания
  tithi_description: >-
    Время начала титхи и его конец:
  can_stop: Ты можешь в любой момент отписаться от рассылки через команду /stop.
  mission: >
    Я здесь для того, чтобы рассчитывать дни голодания
    (<i>Экадаши, Амавасьи, Пурнимы</i>)
    согласно твоему месту проживания.
  start_choose_location: >
    Пожалуйста, нажми на скрепку (где обычно прикрепляют файлы)
    и выбери <b>Location</b> или <b>Местоположение</b>
    или просто <b>введи название города</b> или места
  location_first: Для начала добавь локацию через команду /start
  ready_to_send: За день до %{days}, я буду присылать тебе напоминания о них.
  to_danate: Если ты вдруг захочешь пожертвовать, то вот здесь можно узнать подробности /donate 🙃
  days_update: >
    Ты сможешь обновить дни в которые голодаешь в любой момент, через команду /update_days
  start_choose_day: >
    %{and_now}, давай выберем день, когда ты хочешь получать уведомления о голоданиях.
  location_update: >
    Ты сможешь обновить свою локацию в любой момент, через команду /update_location
  set_location: Твоя локация обновлена!
  no_user: >
    Тебя нету у меня в списке. Так что тут нечего останавливать.
    Но если захочешь, можно начать уведомления через /start
  stop: Я отменил твою подписку на уведомления.
  again: Нажми на /start если снова захочешь запустить эти процессы
  try_again: Попробуй снова!
  something_wrong: Что-то не так с этим запросом
  check_location: Проверь, верно ли я обнаружил твою позицию?
  no_answer: >
    Без вариантов ответа я, к сожалению, не смогу рассчитывать дни голоданий
  to_early: >
    Пожалуйста, не нагружай меня так часто с расчетами.
    Эти цифры, синусы, косинусы... От этого уже начинает болеть голова.
    Подожди хотя бы несколько минут!
  meet_first: |
    Для начала, мне нужны твое местоположения и какие дни для голодания тебе нужны.
    Нажми на /start чтобы начать.
  tithi_answer: |-
    Ближайшие благоприятные дни голоданий для <b>%{place}</b> (UTC%{utc}):
  tithi_wait: Секунду, сейчас взгляну на небо. Нужно провести расчёты... X*y*sin*cos*tan*E*pi/2...
  location_error: |
    Что-то не так с координатами. Не могу считать.
    Попробуй обновить свою локацию через команду /update_location',