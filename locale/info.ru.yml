ru:
   help: |
      %{my_name}
      %{mission}
      <b>В твоем распоряжении доступны следующие команды:</b>
      • /help - Этот текст
      • /start - Начать еще раз вносить настройки (Локацию и день)
      • /cancel - Отменить ввод настроек
      • /update_days - Обновить дни голодания. Экадаши, или Экадаши, Пурнимы и Амавасьи
      • /update_location - Обновить свое местоположение
      • /get_fasting - Рассчитать и получить список ближайших голоданий в соответствии с моим местоположением (<i>действует ограничение - не более 1 запроса в 10 мин.</i>) 
      • /stop - Убрать себя из рассылки
      • /donate - Показать куда можно жертвовать
   donate_jamalpur: |
      Сейчас происходит строительство одного очень вдохновляющего проекта,
      под названием <a href='https://meditationsteps-center.de/jamalpur'>Ананда Самбхути</a>!
      Мне будет очень приятно, если ты сможешь поддержать его! 🙏
      В комментариях платежа можешь дополнить что ты от бота Упаваса. Спасибо!
      
      <b>Вот ссылка на него:</b>
      https://meditationsteps-center.de/jamalpur