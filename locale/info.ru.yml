ru:
   help: |
      %{my_name}
      %{mission}
      <b>В твоем распоряжении доступны следующие команды:</b>
      • /help - Этот текст
      • /start - Начать вносить заново или поменять текущие настройки (Локацию и день)
      • /cancel - Отменить ввод настроек
      • /update_days - Обновить дни голодания. Экадаши, или Экадаши, Пурнимы и Амавасьи
      • /update_location - Обновить свое местоположение
      • /get_fasting - Рассчитать и получить список ближайших голоданий в соответствии с моим местоположением
      • /stop - Убрать себя из рассылки
      • /donate - Показать куда можно пожертвовать
      
      <b>---- ✍️ Процесс регистрации ----</b>
      <b>1.</b> Вначале диалога (/start) тебе предложится возможность добавить свою локацию и зарегистрироваться в системе.
      <b>2.</b> Локация добавляется либо через иконку скрепки и приложением текущего местоположения, либо ты можешь ввести <u>название любого места (город, населенный пункт)</u> на английском или русском.
      Далее нужно подтвердить свою локацию если ты пользовался текстовым вводом для её определения, или же попробовать ввести название места заново, ответив <pre>«Нет»</pre>.
      В дальнейшем локацию можно изменить через команду - /update_location
      <b>3.</b> На следующем этапе нужно выбрать дни голодания, на которые ты бы хотел получать уведомления. Например если ты выберешь только Экадаши, предупреждения о наступлении Амавасьи и Пурнимы тебе высылаться не будут.
      Также на этом этапе можно выбрать <pre>«Отказаться от уведомлений»</pre>. Тогда ты сможешь получать запрос о ближайших днях голоданий вручную, через команду /get_fasting, твоя локация при этом сохранится.
      Этот день можно поменять и позже, через команду - /update_days
      
      <b>---- 🗒 ----</b>
      Если у тебя есть вопросы или ты хочешь внести свое предложение
      в развитие бота или даже поучаствовать в его разработке,
      то для этого есть чат <a href="https://t.me/+IJ8j_POnh0dkNWY1">Упаваса Бот – Разработка</a>.
