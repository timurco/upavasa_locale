pt-br:
  help: |
    %{my_name}
    %{mission}
    <b>Os seguintes comandos estão disponíveis:</b>
    • /help - Informações sobre estes comandos
    • /start - Comece a adicionar configurações novamente ou edite as atuais (Localização e dia)
    • /cancel - Cancelar entrada de dados
    • /update_days - Atualizar dias de jejum. Ekadashi, ou Ekadashi, Purnima e Amavasya
    • /update_location - Atualizar sua localização
    • /get_fasting - Calcular e obter uma lista de jejuns futuros de acordo com sua localização (<i>há uma restrição - não mais que 1 solicitação por 10 minutos.</i>)
    • /stop - Remover-se da lista de e-mails
    • /donate - Mostrar onde você pode doar
  donate_jamalpur: |
    🙏 <b>Projetos que você pode apoiar:</b>

    <b>1. Ananda Sambhuti</b> — construção de um centro espiritual em Jamalpur
    https://anandasambhuti.org/ways-to-donate/

    <b>2. <a href='https://stc-maharlika.org'>STC Maharlika</a></b> — centro de treinamento para irmãs nas Filipinas
    https://donorbox.org/support-the-future-generation-of-didis-stc

    <b>3. Phoenix Project</b> — projeto humanitário de Didi na Ucrânia
    https://phoenixproject.org.ua/en/volunteering#donate

    Nos comentários do pagamento, você pode adicionar que você é do bot Upavasa. Obrigado! 🙏


