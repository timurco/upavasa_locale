bg:
   help: |
      %{my_name}
      %{mission}
      <b>На ваше разположение са следните команди:</b>
      • /help - Този текст
      • /start - Започнете от начало или променете текущите настройки (Локация и ден)
      • /cancel - Отказ от въвеждане на данни
      • /update_days - Обновете дните на постене. Екадаши, или Екадаши, Пурнима и Амаваса
      • /update_location - Обновете вашата локация
      • /get_fasting - Изчислете и получете списък с най-близките дни на пост според вашата локация
      • /stop - Премахнете себе си от абонамента
      • /donate - Покажете къде да направите дарение
      
      <b>---- ✍️ Процес на регистрация ----</b>
      <b>1.</b> На първоначалния диалог (/start) ще ви бъде предоставена възможност да добавите своята локация и да се регистрирате в системата.
      <b>2.</b> Локацията може да се добави чрез иконата на скрепката и приложението на текущата локация, или можете да въведете <u>името на всяко място (град, населено място)</u> на английски или руски език.
      След това трябва да потвърдите локацията си, ако сте използвали текстов вход за нейното определяне, или да опитате да въведете името на мястото отново, като отговорите с <pre>"Не"</pre>.
      В бъдеще локацията може да се промени чрез командата - /update_location
      <b>3.</b> На следващия етап трябва да изберете дните на пост, за които желаете да получавате уведомления. Например, ако изберете само Екадаши, няма да получавате предупреждения за настъпването на Амаваса и Пурнима.
      Също така на този етап можете да изберете <pre>"Откажете се от уведомления"</pre>. Тогава ще можете да получите заявка за най-близките дни на пост ръчно чрез командата /get_fasting, като вашата локация ще бъде запазена.
      Този ден може да се промени по-късно чрез командата - /update_days
      
      <b>---- 🗒 ----</b>
      Ако имате въпроси или искате да предложите нещо за развитието на бота или дори да участвате в неговото разработване,
      има чат <a href="https://t.me/+IJ8j_POnh0dkNWY1">Упаваса Бот – Разработка</a>.
