sv:
  help: |
    %{my_name}
    %{mission}
    <b>Följande kommandon är tillgängliga:</b>
    • /help - Information om dessa kommandon
    • /start - Börja lägga till inställningar igen eller redigera de nuvarande (Plats och dag)
    • /cancel - Avbryt datainmatning
    • /update_days - Uppdatera fastedagar. Ekadashi, eller Ekadashi, Purnima och Amavasya
    • /update_location - Uppdatera din plats
    • /get_fasting - Beräkna och få en lista över kommande faste enligt din plats (<i>det finns en begränsning - inte fler än 1 förfrågan per 10 minuter.</i>)
    • /stop - Ta bort dig från e-postlistan
    • /donate - Visa var du kan donera
  donate_jamalpur: |
    🙏 <b>Projekt du kan stödja:</b>

    <b>1. Ananda Sambhuti</b> — byggande av ett andligt centrum i Jamalpur
    https://anandasambhuti.org/ways-to-donate/

    <b>2. <a href='https://stc-maharlika.org'>STC Maharlika</a></b> — utbildningscenter för systrar i Filippinerna
    https://donorbox.org/support-the-future-generation-of-didis-stc

    <b>3. Phoenix Project</b> — humanitärt projekt av Didi i Ukraina
    https://phoenixproject.org.ua/en/volunteering#donate

    I betalningskommentarerna kan du lägga till att du är från Upavasa bot. Tack! 🙏


