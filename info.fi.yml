fi:
  help: |
    %{my_name}
    %{mission}
    <b>Seuraavat komennot ovat saatavilla:</b>
    • /help - Tietoa näistä komennoista
    • /start - Aloita asetusten lisääminen uudelleen tai muokkaa nykyisiä (Sijainti ja päivä)
    • /cancel - Peruuta tietojen syöttö
    • /update_days - Päivitä paastopäivät. Ekadashi, tai Ekadashi, Purnima ja Amavasya
    • /update_location - Päivitä sijaintisi
    • /get_fasting - Laske ja saa luettelo tulevista paastoista sijaintisi mukaan (<i>on rajoitus - enintään 1 pyyntö per 10 minuuttia.</i>)
    • /stop - Poista itsesi postituslistalta
    • /lang - Vaihda kieli
    • /donate - Näytä mistä voit lahjoittaa
  donate_jamalpur: |
    🙏 <b>Projektit, joita voit tukea:</b>

    <b>1. Ananda Sambhuti</b> — hengellisen keskuksen rakentaminen Jamalpuriin
    https://anandasambhuti.org/ways-to-donate/

    <b>2. <a href='https://stc-maharlika.org'>STC Maharlika</a></b> — koulutuskeskus sisarille Filippiineillä
    https://donorbox.org/support-the-future-generation-of-didis-stc

    <b>3. Phoenix Project</b> — Didin humanitaarinen projekti Ukrainassa
    https://phoenixproject.org.ua/en/volunteering#donate

    Maksukommentteihin voit lisätä, että olet Upavasa botista. Kiitos! 🙏


